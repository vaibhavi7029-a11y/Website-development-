<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaibhavi | 3D Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>&lt;Vaibhavi /&gt;</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- Hero -->
<section id="home">
    <h2 id="typing"></h2>
    <p>Frontend Developer | 3D UI Designer</p>
</section>

<!-- Skills -->
<section id="skills">
    <h2>Skills</h2>
    <div class="cards">
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">Python</div>
    </div>
</section>

<!-- Projects -->
<section id="projects">
    <h2>Projects</h2>
    <div class="cards">
        <div class="card">Portfolio Website</div>
        <div class="card">Cake Shop Website</div>
    </div>
</section>

<!-- Contact -->
<section id="contact">
    <h2>Contact Me</h2>
    <form id="form">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Message"></textarea>
        <button>Send</button>
    </form>
    <p id="msg"></p>
</section>

<footer>
    <p>© 2026 Vaibhavi</p>
</footer>

<script src="script.js"></script>
</body>
</html>
